name: Release Artifacts

# Build relocatable native artifacts. The macOS archive is also vendored by the
# Obey Voice Mac app (delta D5); Linux ships the binary with relative native
# library lookup so it can run without a Go module cache.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-artifact:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: extractions/setup-just@v3
      - name: Install artifact tools
        run: sudo apt-get install --yes patchelf
      - name: Build relocatable Linux amd64 artifact
        run: just release linux-artifact
      - uses: actions/upload-artifact@v4
        with:
          name: samantha-linux-amd64
          path: dist/samantha-linux-amd64.tar.gz
          if-no-files-found: error
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/samantha-linux-amd64.tar.gz --clobber

  macos-artifact:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git describe needs history/tags for the manifest version
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install just
        run: brew install just
      - name: Build relocatable macOS arm64 artifact
        run: just release macos-artifact
      - uses: actions/upload-artifact@v4
        with:
          name: samantha-macos-arm64
          path: dist/samantha-macos-arm64.tar.gz
          if-no-files-found: error
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/samantha-macos-arm64.tar.gz --clobber
